{% extends "base.html" %}

{% block title %}Register | Davhome{% endblock %}

{% block content %}
  <section class="card">
    <h1>Create account</h1>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Create account</button>
    </form>
    <p>Already have an account? <a href="{% url 'login' %}">Sign in</a>.</p>
  </section>
{% endblock %}
