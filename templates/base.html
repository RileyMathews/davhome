<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Davhome{% endblock %}</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Atkinson Hyperlegible", "Noto Sans", sans-serif;
    }

    body {
      margin: 0;
      background: #f8fafc;
      color: #0f172a;
    }

    header {
      background: #0b3c5d;
      color: #fff;
      padding: 0.75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    nav a {
      color: #e2f1ff;
      margin-left: 0.75rem;
      text-decoration: none;
      font-weight: 600;
    }

    nav a:hover {
      text-decoration: underline;
    }

    main {
      max-width: 56rem;
      margin: 1.5rem auto;
      padding: 0 1rem;
    }

    .card {
      background: #fff;
      border: 1px solid #dbe5ee;
      border-radius: 0.75rem;
      padding: 1rem;
      box-shadow: 0 2px 10px rgb(15 23 42 / 0.04);
    }

    .messages {
      list-style: none;
      padding: 0;
    }

    .messages li {
      background: #ecfeff;
      border: 1px solid #67e8f9;
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.5rem;
    }

    form p {
      display: grid;
      gap: 0.35rem;
      margin-bottom: 0.75rem;
    }

    input {
      padding: 0.5rem;
      border-radius: 0.4rem;
      border: 1px solid #94a3b8;
      font: inherit;
    }

    button {
      background: #0b3c5d;
      color: #fff;
      border: 0;
      border-radius: 0.4rem;
      padding: 0.6rem 0.95rem;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <strong>Davhome</strong>
    <nav>
      {% if user.is_authenticated %}
        <a href="{% url 'home' %}">Dashboard</a>
        <form method="post" action="{% url 'logout' %}" style="display:inline;">
          {% csrf_token %}
          <button type="submit">Logout</button>
        </form>
      {% else %}
        <a href="{% url 'login' %}">Login</a>
        <a href="{% url 'register' %}">Register</a>
      {% endif %}
    </nav>
  </header>
  <main>
    {% if messages %}
      <ul class="messages">
        {% for message in messages %}
          <li>{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
