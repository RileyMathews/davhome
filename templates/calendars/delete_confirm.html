{% extends "base.html" %}

{% block title %}Delete Calendar | Davhome{% endblock %}

{% block content %}
  <section class="card">
    <h1>Delete calendar</h1>
    <p>Are you sure you want to delete <strong>{{ calendar.name }}</strong>?</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit">Delete</button>
    </form>
    <p><a href="{% url 'calendars:edit' calendar.id %}">Cancel</a></p>
  </section>
{% endblock %}
