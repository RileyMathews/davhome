{% extends "base.html" %}

{% block title %}Login | Davhome{% endblock %}

{% block content %}
  <section class="card">
    <h1>Sign in</h1>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Login</button>
    </form>
    <p>Need an account? <a href="{% url 'register' %}">Register</a>.</p>
  </section>
{% endblock %}
