version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: davhome-postgres
    environment:
      POSTGRES_USER: davhome
      POSTGRES_PASSWORD: davhome
      POSTGRES_DB: davhome
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U davhome -d davhome"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
